<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Documento Protegido</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1A3A5C;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gate {
    width: 100%;
    max-width: 400px;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .gate-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 1.5rem;
    stroke: #2C5F8A;
  }

  .gate h1 {
    font-size: 1.375rem;
    font-weight: 600;
    color: #1A3A5C;
    margin-bottom: 0.5rem;
  }

  .gate .subtitle {
    font-size: 0.8125rem;
    color: #6b7c8d;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .gate form {
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .gate input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    border: 1.5px solid #d0d7de;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    color: #1A3A5C;
    background: #fafbfc;
  }

  .gate input[type="password"]:focus {
    border-color: #2C5F8A;
    box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.12);
  }

  .gate button {
    width: 100%;
    padding: 0.75rem;
    font-size: 1rem;
    font-weight: 600;
    color: #ffffff;
    background: #1A3A5C;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .gate button:hover { background: #2C5F8A; }
  .gate button:active { background: #15304d; }
  .gate button:disabled {
    background: #a0aab4;
    cursor: not-allowed;
  }

  .gate .error {
    font-size: 0.8125rem;
    color: #c0392b;
    min-height: 1.25rem;
    margin-top: 0.25rem;
  }

  .gate .note {
    font-size: 0.6875rem;
    color: #95a5b6;
    margin-top: 2rem;
  }

  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="gate" id="gate">
  <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    <circle cx="12" cy="16.5" r="1.5"/>
  </svg>
  <h1>Documento Protegido</h1>
  <p class="subtitle">Este documento é confidencial e protegido por senha.</p>
  <form id="authForm" autocomplete="off">
    <input type="password" id="pwd" placeholder="Senha" autofocus required aria-label="Senha">
    <button type="submit" id="btn">Entrar</button>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="error" role="alert"></div>
  </form>
  <p class="note">Acesso restrito</p>
</div>

<script src="content.js"></script>
<script>
(function () {
  "use strict";

  const MAX_ATTEMPTS = 3;
  let attempts = 0;

  const form   = document.getElementById("authForm");
  const pwd    = document.getElementById("pwd");
  const btn    = document.getElementById("btn");
  const errEl  = document.getElementById("error");
  const spin   = document.getElementById("spinner");

  function hexToBytes(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) {
      bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
    }
    return bytes;
  }

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function tryDecrypt(password, reviewer) {
    const salt       = hexToBytes(reviewer.salt);
    const iv         = hexToBytes(reviewer.iv);
    const ciphertext = b64ToBytes(reviewer.data);
    const key        = await deriveKey(password, salt);

    const plainBuf = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: iv },
      key,
      ciphertext
    );

    return new TextDecoder().decode(plainBuf);
  }

  async function decryptMulti(password) {
    if (typeof REVIEWERS === "undefined" || !Array.isArray(REVIEWERS) || REVIEWERS.length === 0) {
      throw new Error("NO_DATA");
    }

    for (const reviewer of REVIEWERS) {
      try {
        const html = await tryDecrypt(password, reviewer);
        return { html: html, name: reviewer.name };
      } catch (e) {
        // Wrong password for this blob — try next
      }
    }

    throw new Error("WRONG_PASSWORD");
  }

  function injectContent(html, reviewerName) {
    // Set reviewer identity before injection so the document JS can read it
    window.__REVIEWER_NAME = reviewerName;

    document.documentElement.innerHTML = html;

    // Re-execute scripts in the decrypted content
    const scripts = document.querySelectorAll("script");
    scripts.forEach(function (orig) {
      const s = document.createElement("script");
      if (orig.src) {
        s.src = orig.src;
      } else {
        s.textContent = orig.textContent;
      }
      Array.from(orig.attributes).forEach(function (attr) {
        if (attr.name !== "src") s.setAttribute(attr.name, attr.value);
      });
      orig.parentNode.replaceChild(s, orig);
    });
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    if (attempts >= MAX_ATTEMPTS) return;

    const password = pwd.value;
    if (!password) return;

    errEl.textContent = "";
    btn.style.display = "none";
    spin.style.display = "block";

    try {
      const result = await decryptMulti(password);
      injectContent(result.html, result.name);
    } catch (err) {
      attempts++;
      spin.style.display = "none";
      btn.style.display = "block";

      if (attempts >= MAX_ATTEMPTS) {
        errEl.textContent = "Acesso bloqueado";
        pwd.disabled = true;
        btn.disabled = true;
      } else if (err.message === "NO_DATA") {
        errEl.textContent = "Documento não disponível.";
      } else {
        errEl.textContent = "Senha incorreta. Tentativa " + attempts + " de " + MAX_ATTEMPTS + ".";
        pwd.value = "";
        pwd.focus();
      }
    }
  });
})();
</script>

</body>
</html>
